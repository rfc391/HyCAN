name: ci

on:
  push:
    branches:
      - "main"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker Buildx for multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: "latest"
          driver: docker-container  # Recommended driver
          endpoint: "robs391/hycan"

      # Step 4: Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .  # Root directory for the Docker context
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/robs391/hycan:latest
          push: ${{ github.event_name != 'pull_request' }}  # Push only if not a PR
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/robs391/hycan:cache
          cache-to: type=inline
