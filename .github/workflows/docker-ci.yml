name: ci

on:
  push:
    branches:
      - "main"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: "lab:latest"
          driver: cloud
          endpoint: "robs391/hycan"
      - name: Build and push
       run: |
        docker build -t hycan-app .
        docker tag hycan-app:latest ${{ secrets.DOCKER_USERNAME }}/hycan-app:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/hycan-app:latest
