name: Test, Build, and Dockerize

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-dash

    - name: Run tests
      run: pytest tests/

  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/hycan:latest
        push: ${{ github.event_name != 'pull_request' }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/hycan:cache
        cache-to: type=inline

    - name: Send Notification to Slack
      if: ${{ success() }}
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"Build and Push Completed for branch: ${{ github.ref_name }}"}' \
        ${{ secrets.SLACK_WEBHOOK_URL }}
